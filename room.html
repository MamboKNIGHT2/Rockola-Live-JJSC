<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala - YouTube Party</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="room-container">
        <header>
            <h1>🎵 Sala: <span id="roomTitle"></span></h1>
            <span id="userBadge" class="badge"></span>
        </header>

        <div class="main-layout">
            <!-- Reproductor -->
            <div class="player-section">
                <div id="playerWrapper">
                    <div id="player"></div>
                </div>
                <div id="nowPlaying" class="now-playing">
                    <p>Esperando que el Admin reproduzca algo...</p>
                </div>
            </div>

            <!-- Panel lateral -->
            <div class="side-panel">
                <!-- Búsqueda (todos los usuarios) -->
                <div class="search-box">
                    <h3>🔍 Buscar en YouTube</h3>
                    <div class="search-input-row">
                        <input type="text" id="searchInput" placeholder="Canciones, artistas...">
                        <button id="searchBtn"><span class="material-icons">search</span></button>
                    </div>
                    <div id="searchResults" class="results-list"></div>
                </div>

                <!-- Playlist -->
                <div class="playlist-section">
                    <h3>📋 Playlist</h3>
                    <div id="playlistContainer" class="playlist"></div>
                </div>
            </div>
        </div>

        <!-- Controles de administrador -->
        <div id="adminControls" class="admin-bar hidden">
            <button id="prevBtn"><span class="material-icons">skip_previous</span></button>
            <button id="playPauseBtn"><span class="material-icons">play_arrow</span></button>
            <button id="nextBtn"><span class="material-icons">skip_next</span></button>
            <span class="admin-label">Controles de Admin</span>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/search.js"></script>
    <script src="js/room.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
