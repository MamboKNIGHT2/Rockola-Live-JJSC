<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Rockola en vivo — pide tus canciones favoritas" />
  <title>🎵 Rockola en Vivo</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { padding-bottom: 2rem; }
    main { padding-top: 1.5rem; }
    .search-section { margin-top: 1.5rem; }
    #results-section { margin-top: 1rem; }
    #confirm-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--success);
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.9rem;
      z-index: 200;
      transition: transform 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #confirm-toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="site-header" role="banner">
    <div class="container">
      <a href="index.html" class="logo" aria-label="Rockola en Vivo — inicio">
        <span class="logo-icon" aria-hidden="true">🎸</span>
        <span class="logo-text">Rockola en Vivo</span>
      </a>
      <span id="ws-status" class="badge badge-gold" aria-live="polite" aria-label="Estado de conexión">
        🟢 En vivo
      </span>
    </div>
  </header>

  <!-- ── Contenido principal ────────────────────────────────────────────── -->
  <main class="container" id="main-content">

    <!-- Reproduciendo ahora -->
    <section aria-label="Reproduciendo ahora" id="now-playing-section" class="mt-3">
      <div id="now-playing-empty" class="empty-state">
        <span class="empty-state-icon" aria-hidden="true">🎵</span>
        <p class="empty-state-title">La cola está vacía</p>
        <p class="empty-state-sub text-muted">¡Sé el primero en pedir una canción! 👇</p>
      </div>
      <div id="now-playing-card" class="now-playing hidden" role="region" aria-label="Canción en reproducción">
        <div>
          <span class="now-playing-badge">
            <span class="pulse" aria-hidden="true"></span>
            Reproduciendo
          </span>
        </div>
        <img id="now-playing-thumb" src="" alt="" class="now-playing-thumb" width="64" height="48" />
        <div class="now-playing-info">
          <p id="now-playing-title" class="now-playing-title"></p>
          <p class="now-playing-sub">🎤 Sonando ahora</p>
        </div>
      </div>
    </section>

    <!-- Cola de canciones -->
    <section class="queue-section" aria-label="Cola de canciones">
      <p class="section-title">
        <span aria-hidden="true">📋</span>
        Cola de canciones
        <span id="queue-count" class="badge badge-gold" aria-live="polite" aria-label="Canciones en cola">0</span>
      </p>
      <ul id="queue-list" class="queue-list" aria-live="polite" aria-label="Lista de canciones en espera">
        <!-- Se rellena dinámicamente -->
      </ul>
    </section>

    <!-- Búsqueda -->
    <section class="search-section" aria-label="Buscar canciones">
      <p class="section-title">
        <span aria-hidden="true">🔍</span>
        Buscar en YouTube
      </p>
      <div class="search-row">
        <label for="search-input" class="sr-only">Buscar canción o artista</label>
        <input
          type="search"
          id="search-input"
          class="form-input"
          placeholder="🎵 Busca una canción o artista..."
          aria-label="Buscar canción o artista"
          autocomplete="off"
          minlength="2"
        />
        <button
          id="search-btn"
          class="btn btn-gold"
          aria-label="Buscar"
          type="button"
        >
          <span aria-hidden="true">🔍</span> Buscar
        </button>
      </div>

      <!-- Mensajes de error de búsqueda -->
      <div id="search-error" class="alert alert-error mt-2 hidden" role="alert" aria-live="assertive"></div>

      <!-- Resultados -->
      <div id="results-section" aria-label="Resultados de búsqueda">
        <ul id="results-list" class="results-list" aria-label="Resultados de YouTube"></ul>
      </div>
    </section>

  </main>

  <!-- Toast de confirmación -->
  <div id="confirm-toast" role="status" aria-live="polite">✅ ¡Canción agregada a la cola!</div>

  <!-- ── Scripts ────────────────────────────────────────────────────────── -->
  <script src="js/jukebox.js"></script>
  <script>
    // ── Configuración ──────────────────────────────────────────────────────
    // 🔑 El dueño del local pone su API Key aquí una sola vez.
    // Los clientes no ven ni tocan esto.
    const YOUTUBE_API_KEY = 'AIzaSyD-NKQi-0Si0dDy8z5-w9F563iAIyi27R0';
    const YOUTUBE_SEARCH_URL = 'https://www.googleapis.com/youtube/v3/search';
    const MAX_RESULTS = 8;

    // ── Referencias al DOM ─────────────────────────────────────────────────
    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const searchError = document.getElementById('search-error');
    const resultsList = document.getElementById('results-list');
    const queueList = document.getElementById('queue-list');
    const queueCount = document.getElementById('queue-count');
    const nowPlayingSection = document.getElementById('now-playing-section');
    const nowPlayingCard = document.getElementById('now-playing-card');
    const nowPlayingEmpty = document.getElementById('now-playing-empty');
    const nowPlayingThumb = document.getElementById('now-playing-thumb');
    const nowPlayingTitle = document.getElementById('now-playing-title');
    const confirmToast = document.getElementById('confirm-toast');

    // ── Renderizar cola ────────────────────────────────────────────────────
    function renderQueue() {
      const queue = Jukebox.getQueue();
      queueCount.textContent = queue.length;

      // "Reproduciendo ahora" = primer elemento
      if (queue.length > 0) {
        const current = queue[0];
        nowPlayingCard.classList.remove('hidden');
        nowPlayingEmpty.classList.add('hidden');
        nowPlayingThumb.src = current.thumbnail;
        nowPlayingThumb.alt = current.title;
        nowPlayingTitle.textContent = current.title;
      } else {
        nowPlayingCard.classList.add('hidden');
        nowPlayingEmpty.classList.remove('hidden');
      }

      // Lista de espera (sin el primero)
      const waiting = queue.slice(1);
      if (waiting.length === 0) {
        queueList.innerHTML = '';
        return;
      }

      queueList.innerHTML = waiting.map((item, idx) => `
        <li class="queue-item" data-id="${escapeHtml(item.id)}">
          <span class="queue-position" aria-label="Posición ${idx + 2}">${idx + 2}</span>
          <img
            class="queue-thumb"
            src="${escapeHtml(item.thumbnail)}"
            alt=""
            width="56" height="42"
            loading="lazy"
          />
          <div class="queue-info">
            <p class="queue-title">${escapeHtml(item.title)}</p>
            <p class="queue-meta">⏳ En espera</p>
          </div>
        </li>
      `).join('');
    }

    // ── Búsqueda en YouTube ────────────────────────────────────────────────
    async function searchYouTube(query) {
      if (YOUTUBE_API_KEY === 'TU_API_KEY_AQUI') {
        showSearchError('⚠️ Configura tu API Key de YouTube en el archivo index.html para habilitar la búsqueda.');
        return;
      }

      searchBtn.disabled = true;
      searchBtn.innerHTML = '<span class="spinner" aria-hidden="true"></span> Buscando...';
      hideSearchError();
      resultsList.innerHTML = '';

      try {
        const params = new URLSearchParams({
          part: 'snippet',
          q: query,
          type: 'video',
          videoEmbeddable: 'true',
          maxResults: MAX_RESULTS,
          key: YOUTUBE_API_KEY,
        });

        const res = await fetch(`${YOUTUBE_SEARCH_URL}?${params}`);

        if (!res.ok) {
          if (res.status === 403) {
            showSearchError('❌ Cuota de YouTube agotada o API Key inválida. Intenta más tarde.');
          } else {
            showSearchError(`❌ Error al buscar (${res.status}). Intenta de nuevo.`);
          }
          return;
        }

        const data = await res.json();

        if (!data.items || data.items.length === 0) {
          resultsList.innerHTML = `
            <li class="empty-state">
              <span class="empty-state-icon" aria-hidden="true">🔇</span>
              <p class="empty-state-title">Sin resultados</p>
              <p class="empty-state-sub text-muted">No encontramos nada para "${escapeHtml(query)}"</p>
            </li>
          `;
          return;
        }

        renderResults(data.items);

      } catch (err) {
        showSearchError('❌ Error de conexión. Verifica tu internet e intenta de nuevo.');
      } finally {
        searchBtn.disabled = false;
        searchBtn.innerHTML = '<span aria-hidden="true">🔍</span> Buscar';
      }
    }

    function renderResults(items) {
      resultsList.innerHTML = items.map(item => {
        const videoId = item.id.videoId;
        const title = item.snippet.title;
        const thumb = item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url || '';
        return `
          <li class="result-item">
            <img
              class="result-thumb"
              src="${escapeHtml(thumb)}"
              alt=""
              width="80" height="60"
              loading="lazy"
            />
            <div class="result-info">
              <p class="result-title">${escapeHtml(title)}</p>
            </div>
            <button
              class="btn btn-gold btn-sm"
              aria-label="Pedir: ${escapeHtml(title)}"
              data-video-id="${escapeHtml(videoId)}"
              data-title="${escapeHtml(title)}"
              data-thumb="${escapeHtml(thumb)}"
              onclick="addSong(this)"
              type="button"
            >
              🎵 Pedir
            </button>
          </li>
        `;
      }).join('');
    }

    // ── Agregar canción a la cola ──────────────────────────────────────────
    function addSong(btn) {
      const videoId = btn.dataset.videoId;
      const title = btn.dataset.title;
      const thumbnail = btn.dataset.thumb;

      Jukebox.addToQueue({ videoId, title, thumbnail });
      renderQueue();
      showToast();

      // Feedback visual en el botón
      btn.disabled = true;
      btn.textContent = '✅ Pedida';
      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = '🎵 Pedir';
      }, 3000);
    }

    // ── Toast de confirmación ──────────────────────────────────────────────
    function showToast() {
      confirmToast.classList.add('show');
      setTimeout(() => confirmToast.classList.remove('show'), 2500);
    }

    // ── Mensajes de error ──────────────────────────────────────────────────
    function showSearchError(msg) {
      searchError.textContent = msg;
      searchError.classList.remove('hidden');
    }

    function hideSearchError() {
      searchError.classList.add('hidden');
    }

    // ── Escuchar cambios de la cola desde otras pestañas ───────────────────
    Jukebox.onEvent((e) => {
      if (e.type === 'queue:updated') {
        renderQueue();
      }
    });

    // ── Eventos de búsqueda ────────────────────────────────────────────────
    searchBtn.addEventListener('click', () => {
      const q = searchInput.value.trim();
      if (q.length < 2) {
        showSearchError('⚠️ Escribe al menos 2 caracteres para buscar.');
        return;
      }
      searchYouTube(q);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const q = searchInput.value.trim();
        if (q.length < 2) {
          showSearchError('⚠️ Escribe al menos 2 caracteres para buscar.');
          return;
        }
        searchYouTube(q);
      }
    });

    searchInput.addEventListener('input', () => {
      if (searchInput.value.trim() === '') {
        resultsList.innerHTML = '';
        hideSearchError();
      }
    });

    // ── Utilidad: escapar HTML ─────────────────────────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Inicializar ────────────────────────────────────────────────────────
    renderQueue();
  </script>
</body>
</html>
