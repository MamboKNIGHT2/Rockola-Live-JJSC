<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rockola-Live-JJSC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Bienvenido a Rockola-Live</h1>
        <div id="lista-salas"></div>
    </div>

    <script>
        async function cargarSalas() {
            const res = await fetch('salas.json');
            const data = await res.json();
            const contenedor = document.getElementById('lista-salas');

            data.salas.forEach(sala => {
                const div = document.createElement('div');
                div.className = 'sala-card';
                div.innerHTML = `<h3>${sala.nombre}</h3><p>${sala.tipo}</p>`;
                div.onclick = () => entrarASala(sala);
                contenedor.appendChild(div);
            });
        }

        function entrarASala(sala) {
            if (sala.tipo === 'privada') {
                let pass = prompt("Introduce la clave para " + sala.nombre);
                if (pass !== sala.codigo) { alert("Clave incorrecta"); return; }
            }
            alert("Entrando a: " + sala.nombre);
            // Aquí redirigirás a la lógica del reproductor
        }

        cargarSalas();
    </script>
</body>
</html>
